<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poeverse Live Chat</title>
  <style>
    :root {
      --primary: #e94560;
      --secondary: #0f3460;
      --dark: #16213e;
      --darker: #1a1a2e;
      --success: #4CAF50;
      --text: #eee;
      --text-muted: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      background: var(--dark);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
    }

    .chat-header {
      background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 { font-size: 1.5rem; margin: 0; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    .status-dot.error { background: #f44336; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      background: var(--secondary);
      padding: 14px 16px;
      border-radius: 12px;
      border-left: 4px solid var(--primary);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .message-user {
      font-weight: 600;
      color: var(--primary);
    }

    .message-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .message-text {
      line-height: 1.5;
      word-wrap: break-word;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .chat-input {
      padding: 20px;
      background: var(--secondary);
      border-top: 2px solid rgba(255, 255, 255, 0.1);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
    }

    input {
      padding: 12px 16px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: var(--dark);
      color: var(--text);
      font-size: 0.95rem;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    #usernameInput { width: 140px; }
    #messageInput { flex: 1; }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #c7375e 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #messages::-webkit-scrollbar { width: 10px; }
    #messages::-webkit-scrollbar-track { background: var(--darker); }
    #messages::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    @media (max-width: 768px) {
      .input-wrapper { flex-direction: column; }
      #usernameInput { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>🌙 Poeverse Chat</h2>
      <div class="status-badge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </div>

    <div id="messages">
      <div class="loading">Loading messages...</div>
    </div>

    <div class="chat-input">
      <div class="input-wrapper">
        <input type="text" id="usernameInput" placeholder="Your name" maxlength="20">
        <input type="text" id="messageInput" placeholder="Type your message..." maxlength="500">
        <button onclick="sendMessage()" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { Client, Databases, ID, Query } from 'https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm';

    const CONFIG = {
      endpoint: 'https://nyc.cloud.appwrite.io/v1',
      projectId: '69abe2f5003b67f06aa9',
      databaseId: '69abe39a002f5a58710d',
      collectionId: 'chatting'
    };

    const client = new Client()
      .setEndpoint(CONFIG.endpoint)
      .setProject(CONFIG.projectId);

    const databases = new Databases(client);

    async function loadMessages() {
      try {
        const response = await databases.listDocuments(
          CONFIG.databaseId,
          CONFIG.collectionId,
          [Query.orderDesc('timestamp'), Query.limit(50)]
        );

        const messagesDiv = document.getElementById('messages');

        if (response.documents.length === 0) {
          messagesDiv.innerHTML = '<div class="loading">No messages yet. Be the first! 💬</div>';
          setStatus('connected', 'Connected');
          return;
        }

        messagesDiv.innerHTML = response.documents.reverse().map(doc => {
          const time = new Date(doc.timestamp).toLocaleTimeString('en-US', {
            hour: '2-digit', minute: '2-digit'
          });
          
          return `
            <div class="message">
              <div class="message-header">
                <span class="message-user">User ${doc.senderId}</span>
                <span class="message-time">${time}</span>
              </div>
              <div class="message-text">${escapeHtml(doc.messageContent)}</div>
            </div>
          `;
        }).join('');

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        setStatus('connected', 'Connected ✓');

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('messages').innerHTML = 
          `<div class="loading">⚠️ ${error.message}<br><small>Make sure "Account" and "Databases" services are enabled in Settings</small></div>`;
        setStatus('error', 'Error');
      }
    }

    window.sendMessage = async function() {
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const message = messageInput.value.trim();

      if (!message) return;

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      try {
        await databases.createDocument(
          CONFIG.databaseId,
          CONFIG.collectionId,
          ID.unique(),
          {
            chatId: Math.floor(Math.random() * 1000000),
            senderId: Math.floor(Math.random() * 1000),
            receiverId: 0,
            messageContent: message,
            timestamp: new Date().toISOString(),
            status: 'sent'
          }
        );

        messageInput.value = '';
        await loadMessages();

      } catch (error) {
        alert('Failed: ' + error.message);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
      }
    };

    function setStatus(type, text) {
      document.getElementById('statusDot').classList.toggle('error', type === 'error');
      document.getElementById('statusText').textContent = text;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    const saved = localStorage.getItem('poeverseUsername');
    if (saved) document.getElementById('usernameInput').value = saved;

    document.getElementById('usernameInput').addEventListener('input', (e) => {
      localStorage.setItem('poeverseUsername', e.target.value);
    });

    loadMessages();
    setInterval(loadMessages, 3000);
  </script>
</body>
</html>
